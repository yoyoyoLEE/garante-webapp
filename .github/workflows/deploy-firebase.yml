# Deploy automatico su Firebase Hosting + Cloud Functions al push su main.
# Richiede il secret FIREBASE_TOKEN nel repository GitHub (vedi README).

name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        working-directory: functions
        run: npm ci

      - name: Build Vite
        run: npm run build

      # Richiede il secret FIREBASE_TOKEN (vedi README). Senza, firebase risponde: "Failed to authenticate".
      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Secret FIREBASE_TOKEN assente o vuoto. Repo → Settings → Secrets and variables → Actions → New repository secret. Nome esatto: FIREBASE_TOKEN. Valore: token da \`firebase login:ci\` sul PC (account con permesso deploy sul progetto Firebase)."
            exit 1
          fi
          npx firebase-tools deploy --only "hosting,functions" --non-interactive
