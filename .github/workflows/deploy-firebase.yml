# Deploy automatico su Firebase Hosting + Cloud Functions al push su main.
# Autenticazione CI: account di servizio Google (secret FIREBASE_SERVICE_ACCOUNT_JSON).
# FIREBASE_TOKEN è deprecato in firebase-tools; non usarlo.

name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        working-directory: functions
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only "hosting,functions" --non-interactive
